# Run from any directory:
#   docker compose up --build

services:
  audiobook-studio:
    build:
      # Points directly to the GitHub repository and branch
      context: https://github.com/Arkoto-Tech/Audiobook-Studio-2.0-Beta1.git#main
      dockerfile: docker/Dockerfile
    image: audiobook-videostudio:latest
    container_name: audiobook-videostudio
    ports:
      - "${HOST_PORT:-8501}:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - AUDIOBOOK_STUDIO_DATA=/data
    volumes:
      # These will map to input/output folders in whatever local directory you run this compose file from
      - ./input:/input
      - ./output:/output
      - audiobook-studio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  audiobook-studio-data:
