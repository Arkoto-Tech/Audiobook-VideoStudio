# Run from the docker/ directory:
#   docker compose up --build
#
# Or from repository root:
#   docker compose -f docker/docker-compose.yml up --build

services:
  audiobook-studio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: audiobook-studio:latest
    container_name: audiobook-studio
    ports:
      - "${HOST_PORT:-8501}:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - AUDIOBOOK_STUDIO_DATA=/data
    volumes:
      # Optional: drop books here for batch workflows / file access
      - ./input:/input
      - ./output:/output
      # User settings and custom fonts persist across restarts
      - audiobook-studio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  audiobook-studio-data:
