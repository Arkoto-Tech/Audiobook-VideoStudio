services:
  audiobook-videostudio:
    image: arkoto123/audiobook-videostudio:latest

    container_name: audiobook-videostudio

    ports:
      - "7860:7860"

    environment:
      TZ: America/New_York
      PYTHONUNBUFFERED: "1"
      GRADIO_SERVER_NAME: "0.0.0.0"

      # Optional future environment variables
      MODEL_DIR: /app/models
      OUTPUT_DIR: /app/output
      TEMP_DIR: /app/temp
      CONFIG_DIR: /app/config

    volumes:
      # User uploads / books
      - ./input:/app/input

      # Final generated audiobooks/videos
      - ./output:/app/output

      # AI/TTS models cache
      - ./models:/app/models

      # App configs/settings
      - ./config:/app/config

      # Temporary rendering/transcoding files
      - ./temp:/app/temp

      # Optional logs folder
      - ./logs:/app/logs

    restart: unless-stopped

    stdin_open: true
    tty: true

    # Shared memory helps large AI/video workloads
    shm_size: "8gb"

    # Optional healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    # Better stop handling for ffmpeg/transcoding
    stop_grace_period: 60s
